name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-client:
    name: Client tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run test:run
      - run: npx tsc --noEmit

  test-server:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - run: npm ci
        working-directory: server

      - run: npm test
        working-directory: server

      - run: npx tsc --noEmit
        working-directory: server
